<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgnesAI Studio</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="light">
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div class="brand-name">AgnesAI <span>Studio</span></div>
      </div>

      <nav id="mode-nav">
        <button class="mode-btn active" data-mode="chat"><span class="ico">💬</span><span>Chat</span></button>
        <button class="mode-btn" data-mode="bilder"><span class="ico">🖼️</span><span>Bilder</span></button>
        <button class="mode-btn" data-mode="video"><span class="ico">🎬</span><span>Video</span></button>
        <button class="mode-btn" data-mode="editor"><span class="ico">✏️</span><span>Editor</span></button>
      </nav>

      <button id="new-chat" class="new-chat">＋ Neue Unterhaltung</button>

      <div id="conv-list" class="conv-list"></div>

      <div class="sidebar-footer">
        <button id="open-settings" class="side-btn"><span class="ico">⚙️</span><span>Einstellungen</span></button>
        <div id="key-status" class="key-status unauth">🔑 Kein API-Key</div>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <div id="mode-title">Chat</div>
        <div id="mode-tools"></div>
      </header>

      <section id="content"></section>

      <footer id="composer"></footer>
    </main>
  </div>

  <div id="modal-root"></div>

  <script src="js/bridge.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/images.js"></script>
  <script src="js/video.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
