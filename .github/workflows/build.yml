name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, win-x64)
        run: dotnet publish src/AgnesAIStudio/AgnesAIStudio.csproj -c Release -r win-x64 --self-contained -o publish
        shell: pwsh

      - name: Download WebView2 Evergreen bootstrapper
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2086861" -OutFile "publish/MicrosoftEdgeWebview2Setup.exe"
        shell: pwsh

      - name: Stage installer source
        run: |
          New-Item -ItemType Directory -Force -Path installer/publish | Out-Null
          Copy-Item -Recurse -Force publish/* installer/publish/
        shell: pwsh

      - name: Build NSIS installer
        run: |
          $exe = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $exe)) { $exe = "C:\ProgramData\chocolatey\lib\nsis\makensis.exe" }
          & $exe installer/installer.nsi
        shell: pwsh

      - name: Download & unpack WebView2 Fixed Runtime
        run: |
          $ver = "1.0.2792.45"
          $cab = "publish/Microsoft.WebView2.FixedVersionRuntime.$ver.x64.cab"
          Invoke-WebRequest -Uri "https://msedgedl.blob.core.windows.net/webview/$ver/Microsoft.WebView2.FixedVersionRuntime.$ver.x64.cab" -OutFile $cab
          New-Item -ItemType Directory -Force -Path publish/WebView2Runtime | Out-Null
          expand.exe $cab -F:* publish/WebView2Runtime
          Remove-Item $cab
        shell: pwsh

      - name: Install NSIS
        run: choco install nsis -y
        shell: pwsh

      - name: Stage installer source
        run: |
          New-Item -ItemType Directory -Force -Path installer/publish | Out-Null
          Copy-Item -Recurse -Force publish/* installer/publish/
        shell: pwsh

      - name: Build NSIS installer
        run: |
          $exe = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $exe)) { $exe = "C:\ProgramData\chocolatey\lib\nsis\makensis.exe" }
          & $exe installer/installer.nsi
        shell: pwsh

      - name: Verify artifact
        run: Get-Item installer/AgnesAIStudio-Setup.exe | Select-Object Name, Length
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgnesAIStudio-Setup
          path: installer/AgnesAIStudio-Setup.exe
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" installer/AgnesAIStudio-Setup.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
